{% extends 'base.html' %}
{% block title %}Change Password — OnlineBazar{% endblock %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-header bg-primary text-white fw-bold"><i class="fas fa-key me-2"></i>Change Password</div>
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Current Password</label>
              <input type="password" name="old_password" class="form-control" required/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">New Password</label>
              <input type="password" name="new_password" class="form-control" minlength="6" required/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Confirm New Password</label>
              <input type="password" name="confirm_password" class="form-control" minlength="6" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Update Password</button>
          </form>
        </div>
      </div>
      <a href="/user/dashboard/" class="btn btn-outline-secondary w-100 mt-2">← Back to Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
