{% extends 'base.html' %}
{% block title %}Edit Profile — OnlineBazar{% endblock %}
{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow">
        <div class="card-header bg-primary text-white fw-bold"><i class="fas fa-edit me-2"></i>Edit Profile</div>
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}
            <div class="row g-3">
              <div class="col-md-6"><label class="form-label fw-semibold">Full Name</label><input type="text" name="name" class="form-control" value="{{ user.name }}" required/></div>
              <div class="col-md-6"><label class="form-label fw-semibold">Phone Number</label><input type="text" name="phone_number" class="form-control" maxlength="10" value="{{ user.phone_number }}" required/></div>
              <div class="col-md-4"><label class="form-label fw-semibold">House No.</label><input type="text" name="house_no" class="form-control" value="{{ user.house_no }}" required/></div>
              <div class="col-md-8"><label class="form-label fw-semibold">Address Line</label><input type="text" name="address_line" class="form-control" value="{{ user.address_line }}" required/></div>
              <div class="col-md-6"><label class="form-label fw-semibold">Nearby Landmark</label><input type="text" name="nearby_landmark" class="form-control" value="{{ user.nearby_landmark|default:'' }}"/></div>
              <div class="col-md-6"><label class="form-label fw-semibold">District</label><input type="text" name="district" class="form-control" value="{{ user.district }}" required/></div>
              <div class="col-md-6"><label class="form-label fw-semibold">State</label><input type="text" name="state" class="form-control" value="{{ user.state }}" required/></div>
              <div class="col-md-6"><label class="form-label fw-semibold">Pincode</label><input type="text" name="pincode" class="form-control" maxlength="6" value="{{ user.pincode }}" required/></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold mt-4">Save Changes</button>
          </form>
        </div>
      </div>
      <a href="/user/dashboard/" class="btn btn-outline-secondary w-100 mt-2">← Back to Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
